<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - RYS Gestión</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            color: #1e293b;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        h1 { color: #1F5BCC; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.5; }
        button {
            background-color: #1F5BCC;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #1546a8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RYS Gestión</h1>
        <p>Parece que no tienes conexión a internet en este momento. Revisa tu señal y vuelve a intentarlo.</p>
        <button onclick="window.location.reload()">REINTENTAR CARGAR</button>
    </div>
</body>
</html>
