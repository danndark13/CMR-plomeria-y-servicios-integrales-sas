
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYS Gestión - Sin Conexión</title>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #ECF1FC; color: #1F5BCC; text-align: center; padding: 20px; }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-weight: 900; text-transform: uppercase; margin: 0; }
        p { color: #64748b; font-weight: 500; }
        button { background: #1F5BCC; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>RYS Gestión requiere internet para sincronizar datos.<br>Por favor, revisa tu señal y reintenta.</p>
    <button onclick="window.location.reload()">REINTENTAR ACCESO</button>
</body>
</html>
